<!DOCTYPE html>
<html>
<head>
    <title>Supabase SQL Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="status">Ready</div>
    <script>
        const supabaseUrl = 'https://esxansmlwwziojoppanw.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzeGFuc21sd3d6aW9qb3BwYW53Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDg1OTEsImV4cCI6MjA5MDAyNDU5MX0.uRqhqx6XNgBKZJh0Ay4j7pf0W67PGQVbFh7DacRKPvw';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);
        const tableId = '6fd666e1-9690-44ea-9398-bd3833533b4a';

        async function run() {
            try {
                document.getElementById('status').innerText = 'Starting...';
                
                // 1. Delete Fields
                const { error: e1 } = await supabase
                    .from('fields')
                    .delete()
                    .eq('table_id', tableId)
                    .in('name', ['New Field 6', 'New Field 7']);
                console.log('Delete fields:', e1);

                // 2. Insert Due Date
                const { data: fData, error: e2 } = await supabase
                    .from('fields')
                    .insert({ table_id: tableId, name: 'Due Date', type: 'date', "order": 5 })
                    .select()
                    .single();
                console.log('Insert field:', e2, fData);
                
                let dueDateFieldId = fData?.id;
                if (e2) {
                    const { data: existing } = await supabase.from('fields').select('id').eq('table_id', tableId).eq('name', 'Due Date').single();
                    if (existing) dueDateFieldId = existing.id;
                }

                // 3. Delete Rows
                const { error: e3 } = await supabase.from('rows').delete().eq('table_id', tableId);
                console.log('Delete rows:', e3);

                // 4. Sample Data
                const samples = [
                    'Mobile API Architecture Redesign',
                    'Q3 User Research Synthesis',
                    'Dark Mode Global Stylesheet',
                    'Payment Gateway Integration',
                    'Infrastructure Audit 2025'
                ];

                const { data: allFields } = await supabase.from('fields').select('*').eq('table_id', tableId);
                const taskNameField = allFields.find(f => f.name.toLowerCase().includes('name'));
                const statusField = allFields.find(f => f.name === 'Status');
                const priorityField = allFields.find(f => f.name === 'Priority');
                const ownerField = allFields.find(f => f.name === 'Owner');

                const rows = samples.map((name, i) => {
                    const today = new Date();
                    const date = new Date();
                    date.setDate(today.getDate() + (i - 2));
                    const data = {};
                    if (taskNameField) data[taskNameField.id] = name;
                    if (dueDateFieldId) data[dueDateFieldId] = date.toISOString().split('T')[0];
                    if (statusField) data[statusField.id] = ['In Progress', 'Planned', 'Stuck', 'Completed', 'Done'][i];
                    if (priorityField) data[priorityField.id] = ['Critical', 'High', 'Medium', 'Low', 'Medium'][i];
                    if (ownerField) data[ownerField.id] = ['Kane', 'Alice', 'Bob', 'Charlie', 'Dave'][i];
                    
                    return { table_id: tableId, order: i, data };
                });

                const { error: e4 } = await supabase.from('rows').insert(rows);
                console.log('Insert rows:', e4);

                document.getElementById('status').innerText = 'Finished ' + (e4 ? 'with error' : 'successfully');
            } catch (err) {
                document.getElementById('status').innerText = 'Error: ' + err.message;
            }
        }
        run();
    </script>
</body>
</html>
